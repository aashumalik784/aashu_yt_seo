<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aashu YouTube SEO - Vercel</title>
    <style>
        :root {
            --red: #E50914;
            --black: #141414;
            --grey: #1f1f1f;
            --galaxy: #0a0e1a;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--galaxy);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--black);
            padding: 25px;
            border-radius: 15px;
            border-top: 4px solid var(--red);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        h1 { text-align: center; color: var(--red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .input-area { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            background: var(--grey);
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--red); }
        button {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: scale(1.01); }
        #loading { display: none; text-align: center; margin: 20px; color: #aaa; font-style: italic; }
        .result { display: none; margin-top: 25px; background: #222; padding: 15px; border-radius: 10px; }
        img { width: 100%; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        label { color: var(--red); font-weight: bold; display: block; margin-top: 15px; }
        textarea {
            width: 100%;
            height: 100px;
            background: #111;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
        }
        .copy-btn { background: #444; font-size: 14px; padding: 8px; width: auto; margin-bottom: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aashu YouTube SEO</h1>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Video Link chipkao ya Topic likho...">
            <button onclick="generateSEO()">Viral SEO Pack Banao</button>
        </div>
        <div id="loading">🚀 AI keywords nikal raha hai...</div>
        <div id="result" class="result">
            <img id="resThumb" src="" alt="Thumbnail">
            <h3 id="resTitle" style="margin: 5px 0; color: #fff;"></h3>
            <label>Viral Tags:</label>
            <textarea id="resTags" readonly></textarea>
            <button class="copy-btn" onclick="copy('resTags')">Tags Copy Karo</button>
            <label>SEO Description & Strategy:</label>
            <textarea id="resDesc" style="height:200px" readonly></textarea>
            <button class="copy-btn" onclick="copy('resDesc')">Description Copy Karo</button>
        </div>
    </div>
    <script>
        async function generateSEO() {
            const input = document.getElementById('userInput').value;
            if(!input) return alert("Bhai, kuch toh likho!");
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            try {
                const res = await fetch('/api/yt-api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: input.includes('http') ? input : null,
                        topic: !input.includes('http') ? input : null
                    })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                document.getElementById('resThumb').src = data.thumbnail || 'AASHU_MALIK.jpg';
                document.getElementById('resTitle').innerText = data.title;
                document.getElementById('resTags').value = data.aiData;
                document.getElementById('resDesc').value = data.aiData;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
            } catch(e) {
                alert("Error: " + e.message);
                document.getElementById('loading').style.display = 'none';
            }
        }
        function copy(id) {
            const t = document.getElementById(id);
            t.select();
            document.execCommand('copy');
            alert("Clipboard mein copy ho gaya!");
        }
    </script>
</body>
</html>
