<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aashu YouTube SEO - Vercel</title>
    <style>
        :root {
            --red: #E50914;
            --black: #141414;
            --grey: #1f1f1f;
            --galaxy: #0a0e1a;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--galaxy);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--black);
            padding: 25px;
            border-radius: 15px;
            border-top: 4px solid var(--red);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        h1 { text-align: center; color: var(--red); text-transform: uppercase; letter-spacing: 2px; }
        
        .input-area { margin: 20px 0; }
        input {
            width: 100%;
            padding: 15px;
            background: var(--grey);
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--red); }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: scale(1.01); }

        #loading { display: none; text-align: center; margin: 20px; color: #aaa; font-style: italic; }
        
        .result { display: none; margin-top: 25px; background: #222; padding: 15px; border-radius: 10px; }
        img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        label { color: var(--red); font-weight: bold; display: block; margin-top: 15px; }
        textarea {
            width: 100%;
            height: 100px;
            background: #111;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
        }
        .copy-btn { background: #444; font-size: 14px; padding: 8px; width: auto; margin-bottom: 10px; }
    </style>
</head>
